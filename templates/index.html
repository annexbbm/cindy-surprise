<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>A Surprise for Cindy ♥</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Lato:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --hs: min(360px, min(86vw, 48vh));
    --r1: calc(var(--hs) * 0.39);
    --r2: calc(var(--hs) * 0.47);
    --r3: calc(var(--hs) * 0.55);
  }

  html { width: 100%; height: 100%; overflow: hidden; overscroll-behavior: none; }

  body {
    position: fixed; inset: 0;
    overflow: hidden; overscroll-behavior: none; touch-action: none;
    background: #000008;
    font-family: 'Lato', sans-serif;
    display: flex; align-items: center; justify-content: center;
  }

  #stars {
    position: absolute; inset: 0; pointer-events: none; z-index: 0; will-change: contents;
  }

  #float-layer {
    position: absolute; inset: 0; pointer-events: none; z-index: 1; contain: strict;
  }

  .float-heart {
    position: absolute; color: #ff4f8b;
    will-change: transform, opacity; transform: translateZ(0);
    animation: floatUp linear infinite;
  }

  .float-heart::before { content: '♥'; font-size: inherit; }

  @keyframes floatUp {
    0%   { transform: translateZ(0) translateY(0) translateX(0) scale(0.5); opacity: 0; }
    10%  { opacity: var(--op); }
    80%  { opacity: var(--op); }
    100% { transform: translateZ(0) translateY(-110vh) translateX(var(--drift)) scale(1.1); opacity: 0; }
  }

  #intro {
    position: absolute; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: clamp(14px, 3.5vh, 32px);
    padding: clamp(24px, 6vw, 60px);
    background: radial-gradient(ellipse at 40% 35%, #1e0018 0%, #0a000f 50%, #000008 100%);
    transition: opacity 0.9s cubic-bezier(0.4,0,0.2,1), visibility 0.9s;
    will-change: opacity;
  }

  #intro.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .envelope {
    font-size: clamp(3rem, 12vw, 5.5rem);
    animation: envFloat 3s ease-in-out infinite;
    filter: drop-shadow(0 0 20px #ff2d6866);
    user-select: none;
  }

  @keyframes envFloat {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50%       { transform: translateY(-10px) rotate(3deg); }
  }

  .intro-pre {
    font-size: clamp(0.75rem, 2.8vw, 1rem);
    color: #ff9ecb88;
    letter-spacing: clamp(3px, 1.5vw, 6px);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.6s forwards;
  }

  .intro-name {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(3.2rem, 14vw, 6.5rem);
    background: linear-gradient(135deg, #ff86b4, #ff2d68, #ffb3d1, #ff2d68);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s ease infinite, fadeUp 0.9s ease 1.1s both;
    letter-spacing: 2px;
    line-height: 1.3;
    padding-bottom: 0.18em;
    text-align: center;
    overflow: visible;
  }

  .intro-divider {
    display: flex; gap: 10px; align-items: center;
    opacity: 0;
    animation: fadeUp 0.7s ease 1.8s forwards;
  }

  .intro-divider span {
    display: inline-block;
    color: #ff2d68;
    font-size: clamp(0.7rem, 2.5vw, 0.95rem);
    animation: heartPop 1.2s ease-in-out infinite;
  }

  .intro-divider span:nth-child(2) { animation-delay: 0.15s; font-size: 1.2em; }
  .intro-divider span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes heartPop {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.35); }
  }

  .intro-tag {
    font-size: clamp(0.85rem, 3vw, 1.15rem);
    font-style: italic;
    color: #ffb3d1aa;
    text-align: center;
    line-height: 1.55;
    max-width: 340px;
    opacity: 0;
    animation: fadeUp 0.8s ease 2.3s forwards;
  }

  .intro-btn {
    margin-top: clamp(6px, 2vh, 16px);
    padding: clamp(12px, 2.5vh, 16px) clamp(24px, 6vw, 36px);
    width: fit-content;
    min-width: 0;
    background: linear-gradient(135deg, #ff2d68, #c4004e);
    border: none; border-radius: 60px;
    font-family: 'Lato', sans-serif;
    font-size: clamp(0.82rem, 2.8vw, 1rem);
    font-weight: 400;
    color: #fff;
    letter-spacing: clamp(2px, 0.8vw, 3px);
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 0 24px #ff2d6866, 0 4px 18px #00000055;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    opacity: 0;
    animation: fadeUp 0.8s ease 3s forwards, btnPulse 1.8s ease-in-out 4s infinite;
  }

  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 0 24px #ff2d6866, 0 4px 18px #00000055; transform: scale(1); }
    50%       { box-shadow: 0 0 40px #ff2d68aa, 0 6px 28px #00000066; transform: scale(1.04); }
  }

  .intro-btn:active { transform: scale(0.96); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50%       { background-position: 100% 50%; }
  }

  #scene {
    position: absolute; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    opacity: 0; visibility: hidden;
    transition: opacity 1s ease 0.1s, visibility 0s linear 1.1s;
    will-change: opacity;
  }

  #scene.visible {
    opacity: 1; visibility: visible;
    transition: opacity 1s ease 0.1s, visibility 0s linear 0s;
  }

  #stage {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center;
    gap: clamp(10px, 2.5vh, 28px);
    padding: clamp(8px, 3vw, 24px);
    width: 100%;
    will-change: transform;
  }

  #heart-wrap {
    position: relative;
    width: var(--hs); height: var(--hs);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    contain: layout style;
  }

  #heart-svg {
    width: 100%; height: 100%;
    will-change: transform;
    transform: translateZ(0);
  }

  .heart-path {
    fill: url(#heartGrad);
    fill-opacity: 0;
    stroke: #ff9ecb;
    stroke-width: 0.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  @keyframes heartbeat {
    0%, 100% { transform: translateZ(0) scale(1); }
    14%       { transform: translateZ(0) scale(1.12); }
    28%       { transform: translateZ(0) scale(1); }
    42%       { transform: translateZ(0) scale(1.07); }
    56%       { transform: translateZ(0) scale(1); }
  }

  @keyframes glowPulse {
    0%, 100% { filter: drop-shadow(0 0 14px #ff2d6877) drop-shadow(0 0 44px #ff006033); }
    50%       { filter: drop-shadow(0 0 24px #ff2d68bb) drop-shadow(0 0 72px #ff006055); }
  }

  .orbit-ring {
    position: absolute; top: 50%; left: 50%; width: 0; height: 0;
    animation: spin linear infinite; will-change: transform;
  }

  .orbit-dot {
    position: absolute; border-radius: 50%;
    transform: translate(-50%, -50%) translateZ(0);
    box-shadow: 0 0 6px currentColor; will-change: transform;
  }

  .dot-r1-a { width: clamp(5px,1.4vw,8px); height: clamp(5px,1.4vw,8px); top: calc(-1 * var(--r1)); left: 0; }
  .dot-r1-b { width: clamp(3px,0.9vw,5px); height: clamp(3px,0.9vw,5px); top: calc(-.7 * var(--r1)); left: calc(.55 * var(--r1)); }
  .dot-r2-a { width: clamp(4px,1.1vw,6px); height: clamp(4px,1.1vw,6px); top: calc(-1 * var(--r2)); left: 0; }
  .dot-r2-b { width: clamp(6px,1.6vw,8px); height: clamp(6px,1.6vw,8px); top: 0; left: calc(-1 * var(--r2)); }
  .dot-r2-c { width: clamp(3px,0.8vw,4px); height: clamp(3px,0.8vw,4px); top: 0; left: calc(.88 * var(--r2)); }
  .dot-r3-a { width: clamp(3px,0.9vw,5px); height: clamp(3px,0.9vw,5px); top: calc(-1 * var(--r3)); left: 0; }
  .dot-r3-b { width: clamp(4px,1.3vw,7px); height: clamp(4px,1.3vw,7px); top: calc(var(--r3)); left: 0; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .pulse-ring {
    position: absolute; top: 50%; left: 50%;
    width: calc(var(--hs) * 1.1); height: calc(var(--hs) * 1.1);
    border-radius: 50%;
    transform: translate(-50%, -50%) translateZ(0);
    border: 1.5px solid #ff2d6844;
    animation: pulseRing 2.2s ease-out infinite;
    pointer-events: none; will-change: transform, opacity; opacity: 0;
  }

  .pulse-ring:nth-child(2) { animation-delay: 0.73s; }
  .pulse-ring:nth-child(3) { animation-delay: 1.46s; }

  @keyframes pulseRing {
    0%   { transform: translate(-50%,-50%) translateZ(0) scale(0.82); opacity: 0.55; }
    100% { transform: translate(-50%,-50%) translateZ(0) scale(1.65); opacity: 0; }
  }

  .love-title {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2.2rem, 9vw, 4.2rem);
    background: linear-gradient(135deg, #ff6eb4, #ff2d68, #ff9ecb, #ff2d68);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s ease infinite;
    letter-spacing: clamp(1px, 0.4vw, 3px);
    text-align: center; white-space: nowrap;
    opacity: 0; transition: opacity 0.8s ease;
  }

  .love-sub {
    font-size: clamp(0.6rem, 2.6vw, 0.95rem);
    color: #ff9ecb77;
    letter-spacing: clamp(2px, 1.2vw, 5px);
    text-transform: uppercase;
    text-align: center;
    opacity: 0; transition: opacity 0.8s ease;
  }

  .badge {
    position: fixed;
    bottom: max(12px, env(safe-area-inset-bottom, 12px));
    right: max(14px, env(safe-area-inset-right, 14px));
    font-size: clamp(0.5rem, 1.6vw, 0.68rem);
    color: #ffffff22; letter-spacing: 2px; z-index: 200;
  }

  @media (max-height: 480px) and (orientation: landscape) {
    :root { --hs: min(200px, 62vh); }
    #stage { flex-direction: row; flex-wrap: wrap; justify-content: center; max-width: 100%; }
    .love-title { font-size: clamp(1.3rem, 4.5vw, 2rem); }
    .love-sub   { font-size: clamp(0.5rem, 1.8vw, 0.75rem); letter-spacing: 2px; }
    .intro-name { font-size: clamp(2.2rem, 10vw, 4rem); }
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div id="float-layer"></div>

<div id="intro">
  <div class="envelope">💌</div>
  <p class="intro-pre">a little surprise for</p>
  <h1 class="intro-name">Cindy</h1>
  <div class="intro-divider">
    <span>♥</span><span>♥</span><span>♥</span>
  </div>
  <p class="intro-tag">Something made just for you,<br>with all the love in the world.</p>
  <button class="intro-btn" id="open-btn">&#9829; &nbsp; Tap to Open &nbsp; &#9829;</button>
</div>

<div id="scene">
  <div id="stage">
    <div id="heart-wrap">
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>

      <svg id="heart-svg" viewBox="-18 -14 36 33" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="heartGrad" cx="50%" cy="38%" r="62%">
            <stop offset="0%"   stop-color="#ff86b4"/>
            <stop offset="40%"  stop-color="#ff2d68"/>
            <stop offset="100%" stop-color="#7a0028"/>
          </radialGradient>
        </defs>
        <path id="hpath" class="heart-path" d="{{ heart_d | safe }}" />
      </svg>

      <div class="orbit-ring" style="animation-duration:4.5s;">
        <div class="orbit-dot dot-r1-a" style="background:#ff79a8;color:#ff79a8;"></div>
        <div class="orbit-dot dot-r1-b" style="background:#ff2d68;color:#ff2d68;"></div>
      </div>
      <div class="orbit-ring" style="animation-duration:7s;animation-direction:reverse;">
        <div class="orbit-dot dot-r2-a" style="background:#ffb3d1;color:#ffb3d1;"></div>
        <div class="orbit-dot dot-r2-b" style="background:#ff4f8b;color:#ff4f8b;"></div>
        <div class="orbit-dot dot-r2-c" style="background:#ff79a8;color:#ff79a8;"></div>
      </div>
      <div class="orbit-ring" style="animation-duration:10s;">
        <div class="orbit-dot dot-r3-a" style="background:#ff2d68;color:#ff2d68;"></div>
        <div class="orbit-dot dot-r3-b" style="background:#ff9ecb;color:#ff9ecb;"></div>
      </div>
    </div>

    <h1 class="love-title">Cindy Love &#9829;</h1>
    <p class="love-sub">always &amp; forever</p>
  </div>
</div>

<span class="badge">Built with Python &#9829;</span>

<script>
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
document.addEventListener('gesturestart',  e => e.preventDefault(), { passive: false });
document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });

const starCanvas = document.getElementById('stars');
const sCtx = starCanvas.getContext('2d');
let starTick = 0;

function resizeStars() {
  starCanvas.width  = window.innerWidth;
  starCanvas.height = window.innerHeight;
}
resizeStars();
window.addEventListener('resize', resizeStars, { passive: true });

const STARS = Array.from({length: 160}, () => ({
  x: Math.random(), y: Math.random(),
  r: Math.random() * 1.3 + 0.2,
  speed: Math.random() * 0.0003 + 0.00008,
  phase: Math.random() * Math.PI * 2,
}));

function drawStars(ts) {
  if (++starTick % 2 === 0) {
    sCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
    for (const s of STARS) {
      const tw = 0.35 + 0.65 * Math.abs(Math.sin(ts * s.speed * 1000 + s.phase));
      sCtx.beginPath();
      sCtx.arc(s.x * starCanvas.width, s.y * starCanvas.height, s.r, 0, Math.PI * 2);
      sCtx.fillStyle = `rgba(255,200,220,${tw.toFixed(2)})`;
      sCtx.fill();
    }
  }
  requestAnimationFrame(drawStars);
}
requestAnimationFrame(drawStars);

const PARTICLES = {{ particles_json | safe }};
const floatLayer = document.getElementById('float-layer');
const szScale = Math.min(1, window.innerWidth / 480);

for (const p of PARTICLES) {
  const el = document.createElement('div');
  el.className = 'float-heart';
  el.style.cssText =
    `left:${p.x}%;bottom:-36px;` +
    `font-size:${Math.round(p.size * szScale)}px;` +
    `--op:${p.opacity};--drift:${p.drift}px;` +
    `animation-duration:${(100 / p.speed / 10).toFixed(1)}s;` +
    `animation-delay:${p.delay}s`;
  floatLayer.appendChild(el);
}

const intro  = document.getElementById('intro');
const scene  = document.getElementById('scene');
const hpath  = document.getElementById('hpath');
const hsvg   = document.getElementById('heart-svg');
const title  = document.querySelector('.love-title');
const sub    = document.querySelector('.love-sub');

let revealed = false;

function reveal() {
  if (revealed) return;
  revealed = true;

  intro.classList.add('hidden');
  scene.classList.add('visible');

  const pathLen = hpath.getTotalLength();
  hpath.style.strokeDasharray  = pathLen;
  hpath.style.strokeDashoffset = pathLen;
  hpath.style.transition =
    `stroke-dashoffset 2.2s cubic-bezier(0.4,0,0.2,1),
     fill-opacity 0.9s ease,
     stroke-opacity 0.6s ease`;

  requestAnimationFrame(() => requestAnimationFrame(() => {
    hpath.style.strokeDashoffset = '0';
    setTimeout(() => {
      hpath.style.fillOpacity = '1';
      setTimeout(() => {
        hpath.style.strokeOpacity = '0';
        hsvg.style.animation = 'heartbeat 1.3s ease-in-out infinite, glowPulse 1.3s ease-in-out infinite';
        title.style.opacity = '1';
        setTimeout(() => { sub.style.opacity = '1'; }, 350);
      }, 900);
    }, 2300);
  }));
}

const openBtn = document.getElementById('open-btn');
openBtn.addEventListener('click',    reveal);
openBtn.addEventListener('touchend', e => { e.preventDefault(); reveal(); }, { passive: false });

const stage = document.getElementById('stage');
let tX = 0, tY = 0, cX = 0, cY = 0;

function tickParallax() {
  cX += (tX - cX) * 0.07;
  cY += (tY - cY) * 0.07;
  stage.style.transform = `translate3d(${cX.toFixed(2)}px,${cY.toFixed(2)}px,0)`;
  requestAnimationFrame(tickParallax);
}
tickParallax();

window.addEventListener('mousemove', e => {
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  tX = (e.clientX - cx) / cx * 9;
  tY = (e.clientY - cy) / cy * 6;
}, { passive: true });

let touchActive = false;
document.addEventListener('touchstart', e => {
  if (revealed) {
    touchActive = true;
    const t = e.touches[0];
    const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
    tX = (t.clientX - cx) / cx * 5;
    tY = (t.clientY - cy) / cy * 3.5;
  }
}, { passive: true });

document.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touchActive) return;
  const t = e.touches[0];
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  tX = (t.clientX - cx) / cx * 5;
  tY = (t.clientY - cy) / cy * 3.5;
}, { passive: false });

document.addEventListener('touchend', () => {
  touchActive = false; tX = 0; tY = 0;
}, { passive: true });

if (typeof DeviceOrientationEvent !== 'undefined') {
  window.addEventListener('deviceorientation', e => {
    if (e.beta == null || !revealed) return;
    tX = Math.max(-9, Math.min(9,  (e.gamma || 0) * 0.28));
    tY = Math.max(-6, Math.min(6,  ((e.beta  || 45) - 45) * 0.14));
  }, { passive: true });
}
</script>
</body>
</html>
